x-logging: &logging
  logging:
    driver: json-file
    options: { max-size: "10m", max-file: "3" }

x-restart: &restart
  restart: unless-stopped

x-core-env: &core-env
  SECRET_KEY:      ${SECRET_KEY}
  BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN}
  DB_ENGINE:       postgresql
  DB_HOST:         db
  DB_PORT:         5432
  DB_NAME:         ${DB_NAME:-jumpserver}
  DB_USER:         ${DB_USER:-jumpserver}
  DB_PASSWORD:     ${DB_PASSWORD}
  REDIS_HOST:      redis
  REDIS_PORT:      6379
  REDIS_PASSWORD:  ${REDIS_PASSWORD}
  LOG_LEVEL:       ${LOG_LEVEL:-ERROR}

services:

  # ── Инфраструктура ────────────────────────────────────────────────────────

  db:
    image: postgres:16-alpine
    container_name: ${PREFIX:-one-pam}-db
    <<: [*restart, *logging]
    environment:
      POSTGRES_DB:       ${DB_NAME:-jumpserver}
      POSTGRES_USER:     ${DB_USER:-jumpserver}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks: [backend]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jumpserver} -d ${DB_NAME:-jumpserver}"]
      interval: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: ${PREFIX:-one-pam}-redis
    <<: [*restart, *logging]
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks: [backend]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      retries: 5

  # ── Компоненты OnePam — собираются из sources/ ───────────────────────────

  core:
    image: ${IMAGE_PREFIX:-one-pam}/core:${VERSION}
    build:
      context: sources/core
      dockerfile: Dockerfile-ce
      args:
        GOPROXY: "https://proxy.golang.org,direct"
    container_name: ${PREFIX:-one-pam}-core
    <<: [*restart, *logging]
    environment:
      <<: *core-env
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - core_data:/opt/jumpserver/data
      - core_logs:/opt/jumpserver/logs
    networks: [backend]
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/api/health/"]
      interval: 20s
      retries: 15
      start_period: 120s

  koko:
    image: ${IMAGE_PREFIX:-one-pam}/koko:${VERSION}
    build:
      context: sources/koko
    container_name: ${PREFIX:-one-pam}-koko
    <<: [*restart, *logging]
    privileged: true
    environment:
      CORE_HOST:       http://core:8080
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN}
      LOG_LEVEL:       ${LOG_LEVEL:-ERROR}
      REDIS_HOST:      redis
      REDIS_PORT:      6379
      REDIS_PASSWORD:  ${REDIS_PASSWORD}
    ports:
      - "${SSH_PORT:-2222}:2222"
    volumes:
      - koko_data:/opt/koko/data
    depends_on:
      core: { condition: service_healthy }
    networks: [backend]

  lion:
    image: ${IMAGE_PREFIX:-one-pam}/lion:${VERSION}
    build:
      context: sources/lion
    container_name: ${PREFIX:-one-pam}-lion
    <<: [*restart, *logging]
    environment:
      CORE_HOST:       http://core:8080
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN}
      LOG_LEVEL:       ${LOG_LEVEL:-ERROR}
    volumes:
      - lion_data:/opt/lion/data
    depends_on:
      core: { condition: service_healthy }
    networks: [backend]

  chen:
    image: ${IMAGE_PREFIX:-one-pam}/chen:${VERSION}
    build:
      context: sources/chen
    container_name: ${PREFIX:-one-pam}-chen
    <<: [*restart, *logging]
    environment:
      CORE_HOST:       http://core:8080
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN}
      LOG_LEVEL:       ${LOG_LEVEL:-ERROR}
    depends_on:
      core: { condition: service_healthy }
    networks: [backend]

  kael:
    image: jumpserver/kael:${VERSION}
    container_name: ${PREFIX:-one-pam}-kael
    <<: [*restart, *logging]
    environment:
      CORE_HOST:       http://core:8080
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN}
      LOG_LEVEL:       ${LOG_LEVEL:-ERROR}
    depends_on:
      core: { condition: service_healthy }
    networks: [backend]

  web:
    image: ${IMAGE_PREFIX:-one-pam}/web:${VERSION}
    build:
      context: .
      dockerfile: web.Dockerfile
      args:
        VERSION: ${VERSION}
    container_name: ${PREFIX:-one-pam}-web
    <<: [*restart, *logging]
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - core_data:/opt/jumpserver/data:ro
    depends_on:
      core: { condition: service_healthy }
      koko: { condition: service_started }
      lion: { condition: service_started }
      kael: { condition: service_started }
    networks: [backend, frontend]

networks:
  backend:  { driver: bridge }
  frontend: { driver: bridge }

volumes:
  db_data:
  redis_data:
  core_data:
  core_logs:
  koko_data:
  lion_data:
